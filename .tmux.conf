unbind r
bind r source-file ~/.tmux.conf
unbind t

set -g prefix C-s
set -g focus-events on

set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm*:Tc:sitm=\E[3m'
set -g mouse on
set-option -g status-position bottom
set -g base-index 1
setw -g pane-base-index 1
set-option -g set-clipboard on
set -g extended-keys always

# Pane navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R
bind-key v split-pane -h
bind-key h split-pane -v

# Window navigation (without prefix)
bind-key -n M-h previous-window
bind-key -n M-l next-window

# Switch to windows using Alt + number (no prefix)
bind-key -n M-1 select-window -t :1
bind-key -n M-2 select-window -t :2
bind-key -n M-3 select-window -t :3
bind-key -n M-4 select-window -t :4
bind-key -n M-5 select-window -t :5
bind-key -n M-6 select-window -t :6
bind-key -n M-7 select-window -t :7
bind-key -n M-8 select-window -t :8
bind-key -n M-9 select-window -t :9
bind-key -n M-0 select-window -t :0

# Session switcher popup
bind-key Tab display-popup -E "tmux list-sessions | sed -E 's/:.*$//' | grep -v \"^$(tmux display-message -p '#S')\$\" | fzf --reverse | xargs tmux switch-client -t"
bind-key y display-popup -d "#{pane_current_path}" -w 80% -h 80% -E "lazygit"

# Persistent terminal popup
bind-key t run-shell "tmux has-session -t tmux-terminal-popup 2>/dev/null || tmux new-session -d -s tmux-terminal-popup -c '#{pane_current_path}'; tmux display-popup -w 90% -h 90% -E 'tmux attach-session -t tmux-terminal-popup'"
bind-key q if-shell "[ '#{session_name}' = 'tmux-terminal-popup' ] || [ '#{session_name}' = 'llm-proxy' ]" "detach-client" ""

bind-key a run-shell "~/.local/bin/llm-proxy-toggle"


#Plugins setup
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'mohak34/flexoki-custom-tmux'
# run-shell ~/Workspace/Projects/flexoki_dark-tmux/flexoki_dark.tmux
# set -g @plugin 'catppuccin/tmux#v0.3.0'
# set -g @plugin "adibhanna/gruvbox-tmux"
# set -g @gruvbox-theme dark # dark or light
# set -g @plugin "adibhanna/yukinord-tmux"
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '0'

