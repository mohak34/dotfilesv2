# Hyprland Configuration with Layered Config System
# ================================================
#
# This configuration uses a layered approach:
#   1. core/     - Default configs from dotfiles repo (updated automatically)
#   2. local/    - Your personal overrides (never touched by updates)
#
# To customize, create files in ~/.config/hypr/local/ with the same names.
# Local files are sourced AFTER core files, so they override defaults.
#
# Example: To change your terminal, create local/programs.conf with:
#   $terminal = my-terminal

# =============================================================================
# HARDWARE-SPECIFIC (not in core - these are machine-specific)
# =============================================================================
source = $HOME/.config/hypr/nvidia.conf
source = $HOME/.config/hypr/asus.conf

# =============================================================================
# CORE CONFIGURATION (from dotfiles repo - may be updated)
# =============================================================================
source = $HOME/.config/hypr/core/programs.conf
source = $HOME/.config/hypr/core/autostart.conf
source = $HOME/.config/hypr/core/environment.conf
source = $HOME/.config/hypr/core/appearance.conf
source = $HOME/.config/hypr/core/input.conf
source = $HOME/.config/hypr/core/layout.conf
source = $HOME/.config/hypr/core/keybinds.conf
source = $HOME/.config/hypr/core/windowrules.conf
source = $HOME/.config/hypr/core/monitors.conf

# =============================================================================
# LOCAL OVERRIDES (your customizations - never touched by updates)
# =============================================================================
# These files are optional. Create them to override core settings.
# Use: source = $HOME/.config/hypr/local/<filename>.conf
#
# Available override files:
#   local/programs.conf     - Override default programs ($terminal, $menu, etc.)
#   local/keybinds.conf     - Add or override keybindings
#   local/appearance.conf   - Custom colors, borders, gaps, etc.
#   local/autostart.conf    - Additional autostart applications
#   local/environment.conf  - Additional environment variables
#   local/input.conf        - Custom input device settings
#   local/layout.conf       - Custom layout settings
#   local/windowrules.conf  - Additional window rules
#   local/custom.conf       - Any other custom settings
#
# Hyprland ignores missing files, so these only load if they exist:
source = $HOME/.config/hypr/local/programs.conf
source = $HOME/.config/hypr/local/keybinds.conf
source = $HOME/.config/hypr/local/appearance.conf
source = $HOME/.config/hypr/local/autostart.conf
source = $HOME/.config/hypr/local/environment.conf
source = $HOME/.config/hypr/local/input.conf
source = $HOME/.config/hypr/local/layout.conf
source = $HOME/.config/hypr/local/windowrules.conf
source = $HOME/.config/hypr/local/monitors.conf
source = $HOME/.config/hypr/local/custom.conf
