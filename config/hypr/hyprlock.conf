# ~/.config/hypr/hyprlock.conf
#
# Uses current swww wallpaper with blur
# -----------------------------------------------------

general {
    disable_loading_bar = true
    hide_cursor = true
}

# Background - blur the currently applied wallpaper
background {
    monitor =
    path = cmd[update:0] swww query | head -1 | cut -d':' -f4 | xargs
    color = rgba(30, 30, 46, 1.0)
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 0.8916
    brightness = 0.8172
    vibrancy = 0.1696
    vibrancy_darkness = 0.0
}

# Password input
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    inner_color = rgba(0, 0, 0, 0.5)
    outer_color = rgb(200, 200, 200)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    placeholder_text = <i>Password...</i>
    hidden_input = true
    position = 0, -80
    halign = center
    valign = center
}

# Time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%R")"
    color = rgba(255, 255, 255, 0.9)
    font_size = 90
    font_family = JetBrainsMono Nerd Font
    position = 0, 80
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = rgba(255, 255, 255, 0.7)
    font_size = 25
    font_family = JetBrainsMono Nerd Font
    position = 0, -10
    halign = center
    valign = center
}

# Wrong password message
label {
    monitor =
    text = $FAIL
    color = rgba(255, 255, 255, 0.9)
    font_size = 20
    font_family = JetBrainsMono Nerd Font
    position = 0, -140
    halign = center
    valign = center
}