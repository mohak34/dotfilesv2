# Window Rules (Hyprland 0.53+ syntax)
# See https://wiki.hyprland.org/Configuring/Window-Rules/

# Ignore maximize requests from apps (keeps tiling layout intact)
windowrule = suppress_event maximize, match:class (.*)

# Fix XWayland drag-and-drop focus issues
# windowrule = no_focus on, match:class ^$, match:title ^$, match:xwayland true, match:float true, match:fullscreen false, match:pin false

# Thunar file operation progress
windowrule = float on, match:class Thunar, match:title File Operation Progress

# Zen Browser Picture-in-Picture window
windowrule = float on, match:class zen, match:title Picture-in-Picture
windowrule = pin on, match:class zen, match:title Picture-in-Picture
windowrule = size 960 549, match:class zen, match:title Picture-in-Picture
windowrule = move 1086 602, match:class zen, match:title Picture-in-Picture

# Steam windows
windowrule = float on, match:class steam, match:title Friends List
windowrule = float on, match:class steam, match:title Steam - News

# Pavucontrol
windowrule = float on, match:class Pavucontrol

# Bluetooth Manager (Blueman)
windowrule = float on, match:class Blueman-manager

# Blender Render Window
windowrule = float on, match:class blender, match:title Blender Render

# GPU Screen Recorder UI - fix overlay scaling on 1440p with fractional scaling
windowrule = size 2560 1440, match:class gsr-ui
windowrule = move 0 0, match:class gsr-ui

# GTA IV (Heroic) - fix mouse input issues
windowrule = fullscreen on, match:class gtaiv\.exe
windowrule = allows_input on, match:class gtaiv\.exe
windowrule = stay_focused on, match:class gtaiv\.exe
windowrule = no_focus on, match:class gtaiv\.exe, match:title ^$
windowrule = no_initial_focus on, match:class gtaiv\.exe, match:title ^$

# Satty screenshot editor - float, center, and resize to omarchy size (875x600)
windowrule = float on, match:class com.gabm.satty
windowrule = center on, match:class com.gabm.satty
windowrule = size 875 600, match:class com.gabm.satty
