
# в–Ҳв–„в–ҖвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–„в–ҲвҖғв–Ҳв–„в–„вҖғв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–„вҖғв–ҲвҖғв–Ҳв–„в–‘в–ҲвҖғв–Ҳв–Җв–ҖвҖғв–Ҳв–Җ
# в–Ҳв–‘в–ҲвҖғв–Ҳв–Ҳв–„вҖғв–‘в–Ҳв–‘вҖғв–Ҳв–„в–ҲвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҖвҖғв–ҲвҖғв–Ҳв–‘в–Җв–ҲвҖғв–Ҳв–„в–ҲвҖғв–„в–Ҳ

# See https://wiki.hyprland.org/Configuring/Keywords/
#  &  https://wiki.hyprland.org/Configuring/Binds/

# Main modifier
$mainMod = Super # super / meta / windows key

# Assign apps
$term = ghostty
$file = thunar
$browser = zen-browser
$menu = wofi --show drun

# Window/Session actions
# bindd = $mainMod+Shift, P,Color Picker , exec, hyprpicker -a # Pick color (Hex) >> clipboard# 
bind = $mainMod, Q, killactive # close focused window
bind = $mainMod, W, togglefloating, # toggle the window between focus and float
bind = $mainMod, G, togglegroup, # toggle the window between focus and group
bind = $mainMod, F, fullscreen, # toggle the window between focus and fullscreen
bind = $mainMod, M, exit,
# bind = $mainMod, A, exec, pkill wofi || $menu  # Commented out - using Quickshell launcher instead
bind = $mainMod+Ctrl, L, exec, hyprlock
bind = $mainMod+Ctrl, Q, exec, wlogout --layout ~/.config/wlogout/layout --css ~/.config/wlogout/style.css --buttons-per-row 5 --show-binds

# Application shortcuts
bind = $mainMod, Return, exec, $term # launch terminal
bind = $mainMod, E, exec, $file # launch file manager
bind = $mainMod, B, exec, $browser # launch web browser
bind = $mainMod+Ctrl, V, exec, pavucontrol # launch pavucontrol

# Audio control
bindl  = , XF86AudioMute, exec, pamixer -t
bindl  = , XF86AudioMicMute, exec, ~/.local/bin/scripts/mic-toggle.sh
bindel = , XF86AudioLowerVolume, exec, pamixer -d 5
bindel = , XF86AudioRaiseVolume, exec, pamixer -i 5

# Media control
bindl  = , XF86AudioPlay, exec, playerctl play # toggle between media play and pause
bindl  = , XF86AudioPause, exec, playerctl play-pause # toggle between media play and pause
bindl  = , XF86AudioNext, exec, playerctl next # media next
bindl  = , XF86AudioPrev, exec, playerctl previous # media previous
bindl  = , XF86AudioStop, exec, playerctl stop # stops the playing media

# Brightness control using brightnessctl
# Increase brightness by 5%
bindel = , XF86MonBrightnessUp, exec, brightnessctl set +5%
# Decrease brightness by 5% 
bindel = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Move between grouped windows
bind = $mainMod CTRL , H, changegroupactive, b
bind = $mainMod CTRL , L, changegroupactive, f

# Screenshot keybindings - smart workflow with optional editor

# Fullscreen screenshot (focused monitor) - single key
bind = , Print, exec, ~/.local/bin/scripts/screenshot.sh fullscreen
# Smart screenshot (region/window selection - auto saves, click notification to edit)
bind = $mainMod, Print, exec, ~/.local/bin/scripts/screenshot.sh smart
# Region selection (drag to select any area)
bind = $mainMod+Shift, S, exec, ~/.local/bin/scripts/screenshot.sh region
# Window selection (click on window to capture)
bind = $mainMod+Alt+Shift, S, exec, ~/.local/bin/scripts/screenshot.sh window
# Active monitor screenshot
bind = $mainMod+Alt, Print, exec, ~/.local/bin/scripts/screenshot.sh monitor
# Color picker
bind = $mainMod+Ctrl, Print, exec, pkill hyprpicker || hyprpicker -a
# OCR to clipboard
bind = $mainMod+Shift, T, exec, grim -g "$(slurp)" - | tesseract stdin stdout | wl-copy && notify-send "Screenshot OCR" "Text copied to clipboard"

# Move/Change window focus
bind = $mainMod, h, movefocus, l
bind = $mainMod, l, movefocus, r
bind = $mainMod, k, movefocus, u
bind = $mainMod, j, movefocus, d

# Swap focused window with another
bind = $mainMod+Shift, h, movewindow, l
bind = $mainMod+Shift, l, movewindow, r
bind = $mainMod+Shift, k, movewindow, u
bind = $mainMod+Shift, j, movewindow, d
bind = Alt, Tab, movefocus, d

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Switch workspaces to a relative workspace
bind = $mainMod+Ctrl, Right, workspace, r+1
bind = $mainMod+Ctrl, Left, workspace, r-1

# Move to the first empty workspace
bind = $mainMod+Ctrl, Down, workspace, empty 

# Resize windows
binde = $mainMod+Shift, Right, resizeactive, 30 0
binde = $mainMod+Shift, Left, resizeactive, -30 0
binde = $mainMod+Shift, Up, resizeactive, 0 -30
binde = $mainMod+Shift, Down, resizeactive, 0 30

# Move focused window to a workspace
bind = $mainMod+Shift, 1, movetoworkspace, 1
bind = $mainMod+Shift, 2, movetoworkspace, 2
bind = $mainMod+Shift, 3, movetoworkspace, 3
bind = $mainMod+Shift, 4, movetoworkspace, 4
bind = $mainMod+Shift, 5, movetoworkspace, 5
bind = $mainMod+Shift, 6, movetoworkspace, 6
bind = $mainMod+Shift, 7, movetoworkspace, 7
bind = $mainMod+Shift, 8, movetoworkspace, 8
bind = $mainMod+Shift, 9, movetoworkspace, 9
bind = $mainMod+Shift, 0, movetoworkspace, 10

# Move focused window to a relative workspace
bind = $mainMod+Ctrl+Alt, Right, movetoworkspace, r+1
bind = $mainMod+Ctrl+Alt, Left, movetoworkspace, r-1

# Scroll through existing workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/Resize focused window
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bindm = $mainMod, Z, movewindow
bindm = $mainMod, X, resizewindow

# Clipboard history
bind = $mainMod, V, exec, qs msg clipboard toggle

# Move/Switch to special workspace (scratchpad)
bind = $mainMod+Alt, S, movetoworkspacesilent, special
bind = $mainMod, S, togglespecialworkspace,

# Toggle focused window split
bind = $mainMod, J, togglesplit

# Move focused window to a workspace silently
bind = $mainMod+Alt, 1, movetoworkspacesilent, 1
bind = $mainMod+Alt, 2, movetoworkspacesilent, 2
bind = $mainMod+Alt, 3, movetoworkspacesilent, 3
bind = $mainMod+Alt, 4, movetoworkspacesilent, 4
bind = $mainMod+Alt, 5, movetoworkspacesilent, 5
bind = $mainMod+Alt, 6, movetoworkspacesilent, 6
bind = $mainMod+Alt, 7, movetoworkspacesilent, 7
bind = $mainMod+Alt, 8, movetoworkspacesilent, 8
bind = $mainMod+Alt, 9, movetoworkspacesilent, 9
bind = $mainMod+Alt, 0, movetoworkspacesilent, 10


# QuickShell notification panel
bind = $mainMod, N, exec, qs msg notification-center toggle

# QuickShell control center
bind = $mainMod+Shift, A, exec, qs msg control-center toggle

# QuickShell bar toggle
bind = $mainMod+Shift, B, exec, qs msg shell toggleBar

# QuickShell app launcher
bind = $mainMod, A, exec, qs msg launcher toggle

# QuickShell keybinds viewer
bind = $mainMod, K, exec, qs msg keybinds toggle
